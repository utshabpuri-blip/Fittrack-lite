<!DOCTYPE html>
<html>
<head>
    <title>Login - FitTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">FitTrack 💪</div>
</nav>

<div class="container">

    <h1>Login</h1>

    <form onsubmit="window.location.href='dashboard.html'; return false;">

        <input type="email"
               placeholder="Enter Email"
               required>

        <br><br>

        <input type="password"
               placeholder="Enter Password"
               required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
