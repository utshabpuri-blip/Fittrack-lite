<!DOCTYPE html>
<html>
<head>
    <title>Login - FitTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="hero-login">
        <h1>Welcome Back 💪</h1>
        <p>Track your workouts. Stay motivated. Achieve your goals.</p>

        <img
        src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1000"
        alt="Workout Motivation">
    </div>

    <div class="card">

        <h2>Login to FitTrack</h2>

        <form id="loginForm">

            <input id="email"
                   type="email"
                   placeholder="Enter Email"
                   required>

            <br><br>

            <input id="password"
                   type="password"
                   placeholder="Enter Password"
                   required>

            <br><br>

            <button type="submit">Login</button>

        </form>

    </div>

    <div class="quote">
        <p>"Success starts with self-discipline."</p>
    </div>

</div>
    <h1>Login</h1>

    <input type="email" placeholder="Enter Email"><br><br>

    <input type="password" placeholder="Enter Password"><br><br>

    <button onclick="window.location.href='dashboard.html'">
        Login
    </button>

</div>

</body>
</html>
