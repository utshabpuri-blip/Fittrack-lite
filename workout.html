<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker - FitTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">FitTrack 💪</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="workout.html">Workout</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </nav>

    <div class="container">

        <h1>Workout Tracker 🏋️</h1>

        <form id="workoutForm">
            <input type="text" id="exercise" placeholder="Exercise Name" required><br><br>
            <input type="number" id="sets" placeholder="Sets" required><br><br>
            <input type="number" id="reps" placeholder="Reps" required><br><br>
            <input type="date" id="date" required><br><br>

            <button type="submit">Add Workout</button>
        </form>

        <h2>Workout History</h2>
        <ul id="workoutList"></ul>

    </div>

    <script>
        const form = document.getElementById("workoutForm");
        const list = document.getElementById("workoutList");

        window.onload = function () {
            let workouts = JSON.parse(localStorage.getItem("workouts")) || [];

            workouts.forEach(w => {
                const item = document.createElement("li");
                item.textContent = w;
                list.appendChild(item);
            });
        };

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const exercise = document.getElementById("exercise").value;
            const sets = document.getElementById("sets").value;
            const reps = document.getElementById("reps").value;
            const date = document.getElementById("date").value;

            const workoutText = `${exercise} - ${sets} sets x ${reps} reps (${date})`;

            const item = document.createElement("li");
            item.textContent = workoutText;
            list.appendChild(item);

            let workouts = JSON.parse(localStorage.getItem("workouts")) || [];
            workouts.push(workoutText);
            localStorage.setItem("workouts", JSON.stringify(workouts));

            form.reset();
        });
    </script>

</body>
</html>
