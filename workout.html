<!DOCTYPE html>

<html>
<head>
    <title>Workout Tracker - FitTrack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">FitTrack 💪</div>
</nav>

<div class="container">

```
<h1>Workout Tracker</h1>

<form id="workoutForm">

    <input type="text"
           id="workout"
           placeholder="Enter Workout"
           required>

    <br><br>

    <button type="submit">
        Add Workout
    </button>

</form>

<h2>Workout History</h2>

<ul id="workoutList"></ul>
```

</div>

<script>

let workouts =
JSON.parse(localStorage.getItem("workouts")) || [];

const list =
document.getElementById("workoutList");

function render() {

    list.innerHTML = "";

    workouts.forEach(workout => {

        const li =
        document.createElement("li");

        li.textContent = workout;

        list.appendChild(li);
    });
}

render();

document
.getElementById("workoutForm")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const workout =
    document.getElementById("workout").value;

    workouts.push(workout);

    localStorage.setItem(
        "workouts",
        JSON.stringify(workouts)
    );

    render();

    this.reset();
});

</script>

</body>
</html>
